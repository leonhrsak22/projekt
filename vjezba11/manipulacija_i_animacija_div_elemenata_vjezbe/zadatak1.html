
<html>
<head> 
<title>Manipulacija DIV elementima s javascriptom</title>
</head>

<body>
<img src="slon.gif" width="256" height="256"><br>
<div id="jedan">
<img src="mis_digitalac.gif"><br>
</div>
<img src="mis.gif" width="256" height="256"><br>
<input type="button" value="Sakrij" onclick="window.document.all.jedan.style.visibility='hidden';">
<input type="button" value="Prikazi" onclick="window.document.all.jedan.style.visibility='visible';">
</body>
</html>
