<html>
<head> 
<title>Manipulacija DIV elementima s javascriptom</title>
</head>

<body>
<img src="slon.gif" width="256" height="256"><br>
<div id="jedan" style="position:absolute; top:250; left:150;">
<img src="mis_digitalac.gif"><br>
</div>
<img src="mis.gif" width="256" height="256"><br>
<input type="button" value="Pomakni sliku za 20 piksela udenso" 
onclick="var jedandiv=window.document.all.jedan.style;jedandiv.left=parseInt(jedandiv.left)+20;">
</body>
</html>
