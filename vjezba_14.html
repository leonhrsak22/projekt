<html>
<head>
<title>Z-index</title>
<style>
.divslika 
{
width: 200px;
height: 200px;
position: absolute;
background-size: cover;
z-index: 1;
}
#div1 
{ 
z-index: 3; 
}
#div2 
{ 
z-index: 2; 
}
#div3 
{ 
z-index: 5; 
}
#div5 
{ 
z-index: 5; 
}
#sivi 
{
width: 350px;
height: 200px;
background-color: gray;
position: absolute;
top: 250px;
left: 0px;
z-index: 4;
}
.divslika:hover,
#sivi:hover 
{
z-index: 100;
}
</style>
</head>
  
<body>
<input type="button" value="Ulijevo" onclick="var sividiv=document.getElementById('sivi').style; 
sividiv.left=parseInt(sividiv.left)-20+'px';"> 
<input type="button" value="Udesno" onclick="var sividiv=document.getElementById('sivi').style; 
sividiv.left=parseInt(sividiv.left)+20+'px';">
<div id="div1" class="divslika"
style="top:100px; left:100px; background-image:url('slike2/1.jpg');"></div>
<div id="div2" class="divslika"
style="top:150px; left:150px; background-image:url('slike2/2.jpg');"></div>
<div id="div3" class="divslika"
style="top:200px; left:200px; background-image:url('slike2/3.jpg');"></div>
<div id="div4" class="divslika"
style="top:300px; left:350px; background-image:url('slike2/4.jpg');"></div>
<div id="div5" class="divslika"
style="top:350px; left:300px; background-image:url('slike2/5.jpeg');"></div>
<div id="sivi" style="left:0px;"></div>
</body>
</html>
